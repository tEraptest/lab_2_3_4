events {}

http {
  server {
    listen 80;

    location / {
      return 200 'Gateway is running!';
      add_header Content-Type text/plain;
    }

    location /api/service-1/ {
      proxy_pass http://service-1:3000/;
    }

    location /api/service-2/ {
      proxy_pass http://service-2:3001/;
    }
  }
}